# devbox.yaml
# Python + Node development environment.
# Installs: Docker CE, Python 3 + uv, Node.js LTS + pnpm (via corepack)

provision:
  - mode: system
    script: |
      set -eux

      apt-get update
      apt-get install -y \
        git \
        ca-certificates \
        curl \
        gnupg \
        lsb-release \
        build-essential \
        python3 \
        python3-pip

      # --- Docker CE (official apt repo) ---
      install -m 0755 -d /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/debian/gpg \
        | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      chmod a+r /etc/apt/keyrings/docker.gpg

      echo \
        "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
        https://download.docker.com/linux/debian \
        $(lsb_release -cs) stable" \
        > /etc/apt/sources.list.d/docker.list

      apt-get update
      apt-get install -y \
        docker-ce \
        docker-ce-cli \
        containerd.io \
        docker-buildx-plugin \
        docker-compose-plugin

      systemctl enable docker
      systemctl start docker

      # --- uv (system-wide via pip) ---
      pip3 install --break-system-packages uv

      # --- Node.js LTS (NodeSource) ---
      curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
      apt-get install -y nodejs

      # Enable corepack so the lima user can activate pnpm
      corepack enable

      # --- python -> python3 symlink ---
      ln -sf /usr/bin/python3 /usr/local/bin/python

      # Add the Lima user to the docker group.
      # Lima mirrors the host macOS UID into the VM (typically 501, not 1000).
      # Match on login shell instead of UID range — only real interactive users
      # have /bin/bash, system users have /usr/sbin/nologin regardless of UID.
      LIMA_USER="$(awk -F: '$7=="/bin/bash" && $1!="root" {print $1; exit}' /etc/passwd)"
      usermod -aG docker "$LIMA_USER"

      # Lima SSH sessions are non-login (Class=manager-early), so PAM never
      # loads supplementary groups from /etc/group into the session credentials.
      # usermod correctly adds the user to the docker group, but the running
      # session only sees the primary group. Fix: override docker.socket to use
      # the Lima user's primary group (which is always in the session) instead
      # of the docker group.
      mkdir -p /etc/systemd/system/docker.socket.d
      printf '[Socket]\nSocketGroup=%s\n' "$LIMA_USER" \
        > /etc/systemd/system/docker.socket.d/override.conf
      systemctl daemon-reload
      systemctl restart docker.socket

  - mode: user
    script: |
      set -eux

      # --- pnpm via corepack ---
      corepack prepare pnpm@latest --activate

      # Set up pnpm home dir and PATH for non-interactive use
      pnpm setup

      # LSP servers
      uv tool install pyright
      pnpm add -g typescript typescript-language-server
