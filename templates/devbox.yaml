# devbox.yaml
# Python + Node development environment.
# Installs: Docker CE, Python 3 + uv, Node.js LTS + pnpm (via corepack)

provision:
  - mode: system
    script: |
      set -eux

      apt-get update
      apt-get install -y \
        git \
        ca-certificates \
        curl \
        gnupg \
        lsb-release \
        build-essential \
        python3 \
        python3-pip

      # --- Docker CE (official apt repo) ---
      install -m 0755 -d /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/debian/gpg \
        | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      chmod a+r /etc/apt/keyrings/docker.gpg

      echo \
        "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
        https://download.docker.com/linux/debian \
        $(lsb_release -cs) stable" \
        > /etc/apt/sources.list.d/docker.list

      apt-get update
      apt-get install -y \
        docker-ce \
        docker-ce-cli \
        containerd.io \
        docker-buildx-plugin \
        docker-compose-plugin

      systemctl enable docker
      systemctl start docker

      # --- uv (system-wide via pip) ---
      pip3 install --break-system-packages uv

      # --- Node.js LTS (NodeSource) ---
      curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
      apt-get install -y nodejs

      # Enable corepack so the lima user can activate pnpm
      corepack enable

      # --- python -> python3 symlink ---
      ln -sf /usr/bin/python3 /usr/local/bin/python

      # Add the first real (non-system) user to the docker group.
      # Lima mirrors the host macOS UID (typically 501) into the VM,
      # so we cannot assume UID 1000 — find the user dynamically instead.
      LIMA_USER="$(awk -F: '$3>=500 && $3<65534 {print $1; exit}' /etc/passwd)"
      usermod -aG docker "$LIMA_USER"

  - mode: user
    script: |
      set -eux

      # --- pnpm via corepack ---
      corepack prepare pnpm@latest --activate
