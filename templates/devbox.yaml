# devbox.yaml
# Python + Node development environment.
# System: Docker CE (apt), Nix package manager (Determinate installer)
# User tools: Python 3 + uv, Node.js LTS + pnpm, LSP servers (via Nix)

provision:
  - mode: system
    script: |
      set -eux

      apt-get update
      apt-get install -y \
        ca-certificates \
        curl \
        gnupg \
        lsb-release \
        xz-utils

      # --- Docker CE (official apt repo) ---
      install -m 0755 -d /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/debian/gpg \
        | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      chmod a+r /etc/apt/keyrings/docker.gpg

      echo \
        "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
        https://download.docker.com/linux/debian \
        $(lsb_release -cs) stable" \
        > /etc/apt/sources.list.d/docker.list

      apt-get update
      apt-get install -y \
        docker-ce \
        docker-ce-cli \
        containerd.io \
        docker-buildx-plugin \
        docker-compose-plugin

      systemctl enable docker
      systemctl start docker

      # Add the Lima user to the docker group.
      # Lima mirrors the host macOS UID into the VM (typically 501, not 1000).
      # Match on login shell instead of UID range — only real interactive users
      # have /bin/bash, system users have /usr/sbin/nologin regardless of UID.
      LIMA_USER="$(awk -F: '$7=="/bin/bash" && $1!="root" {print $1; exit}' /etc/passwd)"
      usermod -aG docker "$LIMA_USER"

      # Lima SSH sessions are non-login (Class=manager-early), so PAM never
      # loads supplementary groups from /etc/group into the session credentials.
      # usermod correctly adds the user to the docker group, but the running
      # session only sees the primary group. Fix: override docker.socket to use
      # the Lima user's primary group (which is always in the session) instead
      # of the docker group.
      mkdir -p /etc/systemd/system/docker.socket.d
      printf '[Socket]\nSocketGroup=%s\n' "$LIMA_USER" \
        > /etc/systemd/system/docker.socket.d/override.conf
      systemctl daemon-reload
      systemctl restart docker.socket

      # --- Nix (Determinate installer, multi-user daemon mode) ---
      curl --proto '=https' --tlsv1.2 -sSf -L https://install.determinate.systems/nix \
        | sh -s -- install linux --init systemd --no-confirm


  - mode: user
    script: |
      set -eux

      export PATH="/nix/var/nix/profiles/default/bin:$HOME/.nix-profile/bin:$PATH"

      # Persist Nix in PATH for all future SSH sessions
      echo 'export PATH="/nix/var/nix/profiles/default/bin:$HOME/.nix-profile/bin:$PATH"' >> ~/.bashrc

      # Dev tools via Nix — flakes enabled by default with Determinate installer
      nix profile install \
        nixpkgs#python3 \
        nixpkgs#uv \
        nixpkgs#nodejs \
        nixpkgs#pnpm \
        nixpkgs#pyright \
        nixpkgs#typescript-language-server \
        nixpkgs#typescript
